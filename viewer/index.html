<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>หารูปฉัน · Face Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;500;600;700&family=Chonburi&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16130E;        /* พื้นหลัก น้ำตาลดำอุ่น */
  --surface:#221E16;    /* การ์ด/แถบ */
  --surface2:#2C2720;
  --gold:#D9A441;       /* ทอง จีวร */
  --gold-dim:#8a6a2e;
  --ivory:#F4EFE6;      /* ตัวอักษรหลัก */
  --muted:#9C948A;
  --danger:#C96A5B;
  --ring:2px solid var(--gold);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--ink);color:var(--ivory);font-family:'Anuphan',system-ui,sans-serif;min-height:100vh}
img{display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:var(--gold);text-decoration:none}
.wrap{max-width:1100px;margin:0 auto;padding:0 14px;position:relative}
.admin-launch{position:absolute;top:14px;right:14px;font-size:12px;color:var(--muted);
  border:1px solid var(--surface2);border-radius:999px;padding:8px 14px;background:var(--surface)}
/* ---------- login card ---------- */
.login-ov{position:fixed;inset:0;background:rgba(10,8,5,.82);backdrop-filter:blur(8px);z-index:90;
  display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:linear-gradient(165deg,var(--surface) 0%,var(--surface2) 100%);
  border:1px solid rgba(217,164,65,.28);border-radius:22px;padding:30px 26px 26px;width:100%;max-width:360px;
  box-shadow:0 24px 64px rgba(0,0,0,.55);text-align:center}
.lc-ava{width:72px;height:72px;border-radius:50%;margin:0 auto 14px;font-size:30px;
  background:rgba(217,164,65,.12);border:1px solid rgba(217,164,65,.45);
  display:flex;align-items:center;justify-content:center}
.login-card h3{font-family:'Chonburi',serif;font-weight:400;font-size:21px;color:var(--ivory)}
.lc-sub{font-size:12px;color:var(--muted);margin:5px 0 20px}
.lc-field{display:flex;align-items:center;gap:10px;background:var(--ink);border:1px solid var(--surface2);
  border-radius:12px;padding:0 14px;margin:10px 0;transition:border-color .15s}
.lc-field:focus-within{border-color:var(--gold)}
.lc-field .ic{font-size:14px;opacity:.55}
.lc-field input{flex:1;background:none;border:none;outline:none;color:var(--ivory);
  font-size:15px;font-family:inherit;padding:13px 0;min-width:0}
.lc-row{display:flex;align-items:center;font-size:12px;color:var(--muted);margin:6px 2px 4px}
.lc-row label{display:flex;align-items:center;gap:7px;cursor:pointer}
.lc-row input{accent-color:var(--gold)}
.lc-err{color:var(--danger);font-size:13px;min-height:19px;margin:2px 0 6px}
.login-card .btn{width:100%}

/* ---------- dialog กลาง (แทน prompt/confirm ของ browser) ---------- */
.dlg-ov{position:fixed;inset:0;background:rgba(10,8,5,.82);backdrop-filter:blur(8px);z-index:95;
  display:flex;align-items:center;justify-content:center;padding:20px}
.dlg{background:linear-gradient(165deg,var(--surface) 0%,var(--surface2) 100%);
  border:1px solid rgba(217,164,65,.28);border-radius:20px;padding:24px 22px;width:100%;max-width:380px;
  box-shadow:0 24px 64px rgba(0,0,0,.55)}
.dlg h3{font-size:17px;color:var(--ivory);font-weight:600}
.dlg .d-desc{font-size:13px;color:var(--muted);margin:6px 0 12px;line-height:1.55}
.dlg .d-btns{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.dlg .d-btns .btn{flex:1;min-width:110px;padding:12px 10px;font-size:14px}
.btn.danger{background:var(--danger);color:#fff}

/* ---------- drag บุคคลเข้ากลุ่ม ---------- */
.rail-sec{border-radius:14px;padding:2px 6px;margin:0 -6px}
.rail-sec.drop-hot{outline:2px dashed var(--gold);outline-offset:2px;background:rgba(217,164,65,.07)}
.admin .person[draggable="true"]{cursor:grab}
.person.dragging{opacity:.4}

/* ---------- header ---------- */
header{padding:14px 0 6px}
.eyebrow{font-size:11px;letter-spacing:.18em;color:var(--gold);text-transform:uppercase}
h1.title{font-family:'Chonburi',serif;font-weight:400;font-size:clamp(21px,5vw,32px);line-height:1.25;margin-top:2px}
.sub{color:var(--muted);font-size:13px;margin-top:3px}
.sub b{color:var(--ivory);font-weight:600}

/* ---------- people rail ---------- */
.rail-label{display:flex;align-items:baseline;gap:10px;margin:12px 0 8px}
.rail-label h2{font-size:14px;font-weight:600}
.rail-label span{font-size:12px;color:var(--muted)}
.rail{display:flex;gap:12px;overflow-x:auto;padding:4px 2px 10px;scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent}
.person{flex:0 0 auto;width:64px;text-align:center;position:relative;transition:transform .15s}
.person:active{transform:scale(.94)}
.person .ava{width:56px;height:56px;border-radius:50%;overflow:hidden;margin:0 auto;
  border:2px solid var(--surface2);background:var(--surface2)}
.person.active .ava{border:var(--ring);box-shadow:0 0 0 3px rgba(217,164,65,.25)}
.person .ava img{width:100%;height:100%;object-fit:cover}
.person .nm{font-size:12px;margin-top:6px;color:var(--ivory);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.person .ct{font-size:11px;color:var(--muted)}
.person .badge{position:absolute;top:-2px;right:2px;background:var(--gold);color:#1d1608;font-size:11px;
  font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.person .check{position:absolute;top:-2px;left:2px;width:24px;height:24px;border-radius:50%;
  border:2px solid var(--muted);background:var(--ink);display:none;align-items:center;justify-content:center;font-size:13px}
.person .check::after{content:"";position:absolute;inset:-10px} /* ขยายพื้นที่กดให้ถึง ~44px */
.admin .person .check{display:flex}
.person.selected .check{background:var(--gold);border-color:var(--gold);color:#1d1608}

/* ---------- toolbar ---------- */
.bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:4px 0 14px}
.chip{background:var(--surface);border:1px solid var(--surface2);border-radius:999px;
  padding:10px 16px;font-size:13px;color:var(--ivory)}
.chip.gold{background:var(--gold);color:#1d1608;font-weight:600;border-color:var(--gold)}
.chip.danger{border-color:var(--danger);color:var(--danger)}
.chip:disabled{opacity:.35;cursor:default}
.spacer{flex:1}

/* ---------- grid ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;padding-bottom:80px}
@media(min-width:700px){.grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}}
.ph{position:relative;border-radius:10px;overflow:hidden;background:var(--surface);aspect-ratio:4/3}
.ph img{width:100%;height:100%;object-fit:cover;transition:opacity .3s;opacity:0}
.ph img.ld{opacity:1}
.ph .fc{position:absolute;left:6px;bottom:6px;background:rgba(22,19,14,.75);backdrop-filter:blur(4px);
  border-radius:999px;font-size:11px;padding:3px 9px;color:var(--ivory)}
.empty{color:var(--muted);text-align:center;padding:60px 0;font-size:14px}

/* ---------- lightbox ---------- */
.lb{position:fixed;inset:0;background:rgba(10,8,5,.94);z-index:50;display:none;flex-direction:column}
.lb.open{display:flex}
.lb-top{display:flex;align-items:center;gap:8px;padding:12px 14px}
.lb-top .fname{font-size:13px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-img{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;padding:0 8px}
.lb-img img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px}
.lb-faces{display:flex;gap:10px;overflow-x:auto;padding:10px 14px 4px}
.lb-faces .person{width:56px}
.lb-faces .ava{width:48px;height:48px}
.lb-actions{display:flex;gap:10px;padding:12px 14px calc(18px + env(safe-area-inset-bottom));flex-wrap:wrap}
.btn{flex:1;min-width:140px;text-align:center;padding:13px 16px;border-radius:12px;font-size:15px;font-weight:600}
.btn.gold{background:var(--gold);color:#1d1608}
.btn.line{border:1px solid var(--surface2);color:var(--ivory)}
.nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:64px;display:flex;
  align-items:center;justify-content:center;font-size:26px;color:var(--ivory);opacity:.7}
.nav.prev{left:2px}.nav.next{right:2px}

/* ---------- admin ---------- */
.admin-note{background:var(--surface);border:1px dashed var(--gold-dim);border-radius:12px;
  padding:10px 14px;font-size:13px;color:var(--muted);margin-bottom:12px}
.admin-note b{color:var(--gold)}

/* ---------- project list (landing) ---------- */
.plist{display:grid;gap:12px;margin-top:20px}
.pcard{background:var(--surface);border:1px solid var(--surface2);border-radius:14px;padding:18px;display:block}
.pcard h3{font-size:18px;color:var(--ivory)}
.pcard p{font-size:13px;color:var(--muted);margin-top:4px}

.toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%);background:var(--gold);
  color:#1d1608;font-weight:600;font-size:14px;padding:10px 20px;border-radius:999px;z-index:99;
  opacity:0;pointer-events:none;transition:opacity .25s}
.toast.show{opacity:1}

/* ---------- admin: ย้ายหน้า ---------- */
.admin .lb-faces .person .edit{position:absolute;top:-4px;right:-2px;background:var(--gold);
  color:#1d1608;font-size:10px;font-weight:700;border-radius:999px;padding:2px 6px}
.picker{position:fixed;inset:0;background:rgba(10,8,5,.7);z-index:80;display:flex;
  align-items:flex-end;justify-content:center}
.picker-panel{background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-width:560px;
  max-height:70vh;display:flex;flex-direction:column}
.picker-panel h3{padding:16px 18px 6px;font-size:15px}
.picker-panel p{padding:0 18px 10px;font-size:12px;color:var(--muted)}
.picker-list{overflow-y:auto;padding:0 10px 16px}
.pick-item{display:flex;align-items:center;gap:12px;width:100%;padding:9px 10px;border-radius:12px;text-align:left}
.pick-item:active{background:var(--surface2)}
.pick-item img{width:40px;height:40px;border-radius:50%;object-fit:cover;background:var(--surface2)}
.pick-item .pi-nm{font-size:14px;color:var(--ivory)}
.pick-item .pi-ct{font-size:12px;color:var(--muted)}
.pick-item.new{color:var(--gold);font-weight:600;font-size:14px}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap" id="app">
  <button class="admin-launch" id="btn-admin" onclick="loginFlow()" style="display:none">ช่างภาพ</button>
  <header>
    <div class="eyebrow">Face Finder</div>
    <h1 class="title" id="pj-title">กำลังโหลด…</h1>
    <div class="sub" id="pj-sub"></div>
  </header>
  <div id="content"></div>
</div>

<div class="lb" id="lb">
  <div class="lb-top">
    <div class="fname" id="lb-name"></div>
    <button class="chip" onclick="closeLB()">ปิด ✕</button>
  </div>
  <div class="lb-img" style="position:relative">
    <button class="nav prev" onclick="stepLB(-1)">‹</button>
    <img id="lb-photo" alt="">
    <button class="nav next" onclick="stepLB(1)">›</button>
  </div>
  <div class="lb-faces" id="lb-faces"></div>
  <div class="lb-actions" id="lb-actions"></div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const qs = new URLSearchParams(location.search);
const SLUG = qs.get("p");
const WANT_ADMIN = qs.get("admin") === "1";
let ADMIN = false; // ได้สิทธิ์เมื่อ: ไม่มี user ตั้งไว้ (โหมดเดิม) หรือ login ผ่าน หรือมี session ค้าง
let DATA = null;
let RAW = null;  // สำเนา data.json ดั้งเดิม (ยังไม่ apply draft) ใช้ตอน undo
let activePerson = null;   // personId ที่เลือกดู
let selected = new Set();  // admin: คนที่เลือกเพื่อ merge
let lbList = [];           // รายการ photo ids ใน lightbox ปัจจุบัน
let lbIdx = 0;

const $ = s => document.querySelector(s);
const el = (t, cls, html) => { const e = document.createElement(t); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; };
const toast = m => { const t = $("#toast"); t.textContent = m; t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 1800); };

/* dialog กลางธีมเดียวกับเว็บ — คืน Promise:
   ปุ่ม primary จะ resolve เป็น array ค่าจาก fields, ปุ่มอื่น resolve เป็น value ที่ตั้งไว้, ปิด/ยกเลิก = null */
function dlg({ title, desc, fields = [], buttons }) {
  return new Promise(resolve => {
    const ov = el("div", "dlg-ov");
    const box = el("div", "dlg");
    box.append(el("h3", null, title));
    if (desc) box.append(el("div", "d-desc", desc));
    const inputs = fields.map(f => {
      const w = el("div", "lc-field");
      if (f.icon) w.append(el("span", "ic", f.icon));
      const inp = el("input");
      inp.type = f.type || "text";
      inp.placeholder = f.placeholder || "";
      if (f.value != null) inp.value = f.value;
      w.append(inp);
      box.append(w);
      return inp;
    });
    const err = el("div", "lc-err", "");
    if (fields.length) box.append(err);
    const row = el("div", "d-btns");
    const done = v => { ov.remove(); resolve(v); };
    let primaryBtn = null;
    buttons.forEach(b => {
      const btn = el("button", "btn " + (b.cls || "line"), b.label);
      btn.onclick = () => {
        if (b.primary) {
          const vals = inputs.map(i => i.value);
          if (b.validate) { const m = b.validate(vals); if (m) { err.textContent = m; return; } }
          done(vals);
        } else done("value" in b ? b.value : null);
      };
      if (b.primary) primaryBtn = btn;
      row.append(btn);
    });
    box.append(row);
    ov.onclick = e => { if (e.target === ov) done(null); };
    inputs.forEach(i => { i.onkeydown = e => { if (e.key === "Enter" && primaryBtn) primaryBtn.click(); }; });
    ov.append(box);
    document.body.append(ov);
    if (inputs[0]) { inputs[0].focus(); inputs[0].select(); }
  });
}

/* ---------- URL รูป: รองรับ Drive / ไฟล์ local / โหมด standalone ---------- */
const INLINE = window.__INLINE__ || null;   // {data, files:{relPath:dataURI}}
const base = () => `projects/${SLUG}/`;
const resolve = p => INLINE ? (INLINE.files[p] || "") : base() + p;
const thumbURL = (ph, w) => ph.fbId
  ? `https://drive.google.com/thumbnail?id=${ph.fbId}&sz=w${w}`
  : resolve(ph.src);
const fullURL  = ph => ph.fbId
  ? `https://drive.google.com/thumbnail?id=${ph.fbId}&sz=w1600`
  : resolve(ph.src);
const printDL  = ph => ph.printId
  ? `https://drive.google.com/uc?export=download&id=${ph.printId}`
  : (ph.printSrc ? resolve(ph.printSrc) : null);
const driveView = ph => ph.printId ? `https://drive.google.com/file/d/${ph.printId}/view` : null;

/* ---------- โหลดข้อมูล ---------- */
async function boot() {
  if (INLINE) { RAW = JSON.stringify(INLINE.data); DATA = JSON.parse(RAW); }
  else if (!SLUG) return landing();
  else {
    try {
      const r = await fetch(base() + "data.json");
      DATA = await r.json();
      RAW = JSON.stringify(DATA);
    } catch (e) {
      $("#pj-title").textContent = "ไม่พบข้อมูลโปรเจกต์";
      $("#pj-sub").textContent = "เช็คลิงก์อีกครั้ง หรือติดต่อช่างภาพ";
      return;
    }
  }
  if (sessionStorage.getItem(adminSes()) || localStorage.getItem(adminSes())) ADMIN = true;
  applyDraft();
  render();
  if (WANT_ADMIN && !ADMIN) loginFlow(); // ต้อง login/สมัครก่อนเสมอ ไม่มีทางลัด
}

/* ---------- โหมดช่างภาพ: login ด้วย user/รหัสผ่าน (hash เก็บใน data.json) ---------- */
const adminSes = () => `ff-admin-${SLUG || "inline"}`;
const hasUsers = () => DATA && DATA.adminUsers && Object.keys(DATA.adminUsers).length > 0;

async function sha256(s) {
  const b = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x => x.toString(16).padStart(2, "0")).join("");
}

function enterAdmin(remember) {
  ADMIN = true;
  (remember ? localStorage : sessionStorage).setItem(adminSes(), "1");
  applyDraft();
  render();
  toast("เข้าโหมดช่างภาพแล้ว");
}

async function registerFlow() {
  const v = await dlg({
    title: "สมัครผู้ดูแลงาน",
    desc: "งานนี้ยังไม่มีผู้ดูแล — สร้างบัญชีแรกเพื่อเข้าโหมดช่างภาพ (บัญชีจะถูกล็อกถาวรเมื่อกดบันทึกขึ้นเว็บ)",
    fields: [{ icon: "👤", placeholder: "ชื่อผู้ใช้" },
             { icon: "🔒", placeholder: "รหัสผ่าน", type: "password" },
             { icon: "🔒", placeholder: "ยืนยันรหัสผ่าน", type: "password" }],
    buttons: [{ label: "ยกเลิก" }, { label: "สมัครและเข้าสู่ระบบ", cls: "gold", primary: true,
                validate: vs => !vs[0].trim() ? "กรุณาใส่ชื่อผู้ใช้"
                              : vs[1].length < 4 ? "รหัสผ่านอย่างน้อย 4 ตัวอักษร"
                              : vs[1] !== vs[2] ? "รหัสผ่านไม่ตรงกัน" : "" }],
  });
  if (!v) return;
  applyOp({ t: "user", u: v[0].trim(), h: await sha256(v[1]) });
  enterAdmin(false);
}

function loginFlow() {
  if (ADMIN || !DATA) return;
  if (!hasUsers()) return registerFlow();
  const ov = el("div", "login-ov");
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
  const card = el("div", "login-card");
  card.append(
    el("div", "lc-ava", "📷"),
    el("h3", null, "โหมดช่างภาพ"),
    el("div", "lc-sub", DATA.project + " · เข้าสู่ระบบเพื่อจัดการรูปและบุคคล"));
  const fu = el("div", "lc-field");
  fu.append(el("span", "ic", "👤"));
  const u = el("input"); u.placeholder = "ชื่อผู้ใช้"; u.autocomplete = "username";
  fu.append(u);
  const fp = el("div", "lc-field");
  fp.append(el("span", "ic", "🔒"));
  const pw = el("input"); pw.type = "password"; pw.placeholder = "รหัสผ่าน"; pw.autocomplete = "current-password";
  fp.append(pw);
  const row = el("div", "lc-row");
  const lbl = el("label");
  const cb = el("input"); cb.type = "checkbox";
  lbl.append(cb, document.createTextNode("จดจำการเข้าสู่ระบบในเครื่องนี้"));
  row.append(lbl);
  const err = el("div", "lc-err", "");
  const btn = el("button", "btn gold", "เข้าสู่ระบบ");
  btn.onclick = async () => {
    const h = await sha256(pw.value);
    if ((DATA.adminUsers || {})[u.value.trim()] === h) { ov.remove(); enterAdmin(cb.checked); }
    else { err.textContent = "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง"; pw.value = ""; pw.focus(); }
  };
  u.onkeydown = pw.onkeydown = e => { if (e.key === "Enter") btn.click(); };
  card.append(fu, fp, row, err, btn);
  ov.append(card);
  document.body.append(ov);
  u.focus();
}

/* ---------- undo: ย้อน action ล่าสุด (ถอด op สุดท้ายแล้ว replay ที่เหลือจากข้อมูลดั้งเดิม) ---------- */
const OP_LABELS = { merge: "รวมบุคคล", move: "ย้ายหน้า", name: "ตั้งชื่อ", del: "ลบกลุ่ม",
                    grp: "จัดกลุ่ม", renum: "เรียงเลขใหม่", user: "แก้ผู้ใช้ admin" };
function undoLast() {
  const ops = loadOps();
  if (!ops.length || !RAW) return;
  const undone = ops.pop();
  localStorage.setItem(draftKey(), JSON.stringify(ops));
  DATA = JSON.parse(RAW);
  ops.forEach(op => applyOp(op, false));
  selected.clear();
  if (activePerson && !DATA.people.find(p => p.id === activePerson)) activePerson = null;

/* ---------- admin draft: เก็บทุกการแก้เป็นลำดับ ops ใน localStorage จนกด export ---------- */
const draftKey = () => `ff-ops-${SLUG || "inline"}`;
const loadOps = () => JSON.parse(localStorage.getItem(draftKey()) || "[]");
function applyDraft() {
  if (!ADMIN) return;
  loadOps().forEach(op => applyOp(op, false));
}
function applyOp(op, persist = true) {
  if (op.t === "merge") doMerge(op.into, op.from);
  else if (op.t === "move") doMove(op.photo, op.fi, op.to, op.nid);
  else if (op.t === "del") doDelete(op.id);
  else if (op.t === "grp") {
    op.ids.forEach(i => {
      const p = DATA.people.find(x => x.id === i);
      if (p) { if (op.g) p.group = op.g; else delete p.group; }
    });
  } else if (op.t === "user") {
    DATA.adminUsers = DATA.adminUsers || {};
    if (op.h) DATA.adminUsers[op.u] = op.h; else delete DATA.adminUsers[op.u];
  } else if (op.t === "renum") {
    let n = 0;
    DATA.people.forEach(p => { if (/^คนที่ \d+$/.test(p.name)) p.name = "คนที่ " + (++n); });
  }
  else if (op.t === "name") {
    const p = DATA.people.find(x => x.id === op.id);
    if (p) p.name = op.nm;
  }
  if (persist) {
    const ops = loadOps(); ops.push(op);
    localStorage.setItem(draftKey(), JSON.stringify(ops));
  }
}

/* ---------- นับใหม่ / ลบคนว่าง ---------- */
function recount(pid) {
  const p = DATA.people.find(x => x.id === pid);
  if (!p) return;
  let fc = 0; const set = new Set();
  DATA.photos.forEach(ph => ph.faces.forEach(f => {
    if (f.personId === pid) { fc++; set.add(ph.id); }
  }));
  p.faceCount = fc; p.photoCount = set.size;
  if (fc === 0) {
    DATA.people = DATA.people.filter(x => x.id !== pid);
    if (activePerson === pid) activePerson = null;
  }
}

/* ---------- รวมกลุ่ม ---------- */
function doMerge(intoId, fromId) {
  if (intoId === fromId) return;
  const into = DATA.people.find(p => p.id === intoId);
  const from = DATA.people.find(p => p.id === fromId);
  if (!into || !from) return;
  DATA.photos.forEach(ph => ph.faces.forEach(f => { if (f.personId === fromId) f.personId = intoId; }));
  DATA.people = DATA.people.filter(p => p.id !== fromId);
  recount(intoId);
}

/* ---------- ลบกลุ่มที่ไม่ใช่คน (พระพุทธรูป/ลายเสื้อ/วัตถุ) ---------- */
function doDelete(pid) {
  DATA.photos.forEach(ph => { ph.faces = ph.faces.filter(f => f.personId !== pid); });
  DATA.people = DATA.people.filter(p => p.id !== pid);
  if (activePerson === pid) activePerson = null;
}

/* ---------- ย้ายหน้าหนึ่งหน้าไปอีกคน (หรือแยกเป็นคนใหม่ to="+") ---------- */
function doMove(photoId, fi, to, nid) {
  const ph = DATA.photos.find(x => x.id === photoId);
  if (!ph || !ph.faces[fi]) return;
  const face = ph.faces[fi];
  const oldId = face.personId;
  let target = to;
  if (to === "+") {
    target = nid;
    if (!DATA.people.find(p => p.id === nid)) {
      const src = DATA.people.find(p => p.id === oldId);
      DATA.people.push({
        id: nid, name: "คนใหม่",
        cover: face.faceId ? face.faceId + ".jpg" : (src ? src.cover : ""),
        photoCount: 0, faceCount: 0,
      });
    }
  }
  if (oldId === target) return;
  face.personId = target;
  recount(oldId); recount(target);
}
const nextNewId = () => {
  const n = Math.max(0, ...DATA.people.map(p => parseInt(p.id.replace(/\D/g, "")) || 0)) + 1;
  return `p${String(n).padStart(3, "0")}`;
};

function personChip(p, ctx) {
  const d = el("div", "person" + (p.id === activePerson ? " active" : "") + (selected.has(p.id) ? " selected" : ""));
  d.dataset.pid = p.id;
  const a = el("div", "ava");
  const im = el("img");
  im.src = resolve("faces/" + p.cover);
  im.loading = "lazy";
  im.alt = p.name;
  a.append(im);
  d.append(a, el("div", "nm", p.name), el("div", "ct", `${p.photoCount} รูป`));
  if (ADMIN && ctx === "rail") {
    const ck = el("div", "check", selected.has(p.id) ? "✓" : "");
    ck.onclick = e => { e.stopPropagation(); toggleSelect(p.id); };
    d.append(ck);
    let t;
    d.onpointerdown = () => { t = setTimeout(() => renamePerson(p.id), 600); };
    // ต้องมี pointercancel ด้วย: ตอน scroll แถบบนมือถือ browser ยิง cancel ไม่ใช่ up/leave
    d.onpointerup = d.onpointerleave = d.onpointercancel = () => clearTimeout(t);
    // ลากเข้ากลุ่ม (เดสก์ท็อป) — มือถือใช้ปุ่มจัดกลุ่มแทน
    d.draggable = true;
    d.ondragstart = e => {
      clearTimeout(t);
      e.dataTransfer.setData("text/pid", p.id);
      e.dataTransfer.effectAllowed = "move";
      d.classList.add("dragging");
    };
    d.ondragend = () => d.classList.remove("dragging");
  }
  d.onclick = () => { activePerson = (activePerson === p.id ? null : p.id); closeLB(); render(); };
  return d;
}

function toggleSelect(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  // อัปเดตเฉพาะ chip ที่ติ๊ก ไม่ re-render ทั้งหน้า -> scroll ไม่เด้ง
  const on = selected.has(id);
  document.querySelectorAll(`.person[data-pid="${id}"]`).forEach(d => {
    d.classList.toggle("selected", on);
    const ck = d.querySelector(".check");
    if (ck) ck.textContent = on ? "✓" : "";
  });
  updateAdminBar();
}

function updateAdminBar() {

/* ---------- บันทึกขึ้นเว็บจริงผ่าน GitHub API (เมื่อโฮสต์บน *.github.io) ---------- */
const GH = (() => {
  const m = location.host.match(/^([^.]+)\.github\.io$/);
  if (m) {
    const seg = location.pathname.split("/").filter(Boolean);
    return seg.length ? { owner: m[1], repo: seg[0] } : null;
  }
  // custom domain (เช่น facefinder.etcpproject.com) ชี้กลับ repo เดิม
  if (/^(localhost|127\.)/.test(location.host)) return null; // dev ในเครื่อง = export ไฟล์
  return { owner: "SoullesS712", repo: "PFACE-FINDER" };
})();

    });
    if (!v) return;
    tok = v[0].trim();
    localStorage.setItem("ff-ghtoken", tok);
  }
  const api = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/viewer/projects/${encodeURIComponent(SLUG)}/data.json`;
  const hdr = { Authorization: "Bearer " + tok, Accept: "application/vnd.github+json" };
  toast("กำลังบันทึก...");
  try {
    const cur = await fetch(api, { headers: hdr });
    if (cur.status === 401 || cur.status === 403) {
      localStorage.removeItem("ff-ghtoken");
      return dlg({ title: "Token ใช้ไม่ได้", desc: `GitHub ตอบ ${cur.status} — เช็คสิทธิ์ repo แล้วกดบันทึกใหม่เพื่อใส่ token อีกครั้ง`, buttons: [{ label: "ปิด" }] });
    }
    const sha = cur.ok ? (await cur.json()).sha : undefined;
    const body = JSON.stringify(DATA);
    const bytes = new TextEncoder().encode(body);
    let bin = "";
    for (let i = 0; i < bytes.length; i += 0x8000) bin += String.fromCharCode(...bytes.subarray(i, i + 0x8000));
    const put = await fetch(api, {
      method: "PUT", headers: hdr,
      body: JSON.stringify({ message: `Update ${SLUG} data.json via admin`, content: btoa(bin), sha, branch: "master" }),
    });
    if (!put.ok) throw new Error(`GitHub ตอบ ${put.status}: ${(await put.text()).slice(0, 120)}`);
    RAW = body;                                // baseline ใหม่ = สิ่งที่เพิ่งบันทึก
    localStorage.removeItem(draftKey());       // draft ถูกรวมเข้า baseline แล้ว
    render();
    dlg({ title: "บันทึกสำเร็จ ✓", desc: "เว็บจริงกำลังอัปเดต แขกจะเห็นเวอร์ชันล่าสุดภายใน ~1 นาที", buttons: [{ label: "ตกลง", cls: "gold" }] });
  } catch (e) {
    dlg({ title: "บันทึกไม่สำเร็จ", desc: String(e.message || e) + " — ใช้ปุ่มบันทึกอีกครั้ง หรือดาวน์โหลดไฟล์แทน", buttons: [{ label: "ปิด" }] });
  }
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(DATA)], { type: "application/json" });
  const a = el("a");
  a.href = URL.createObjectURL(blob);
  a.download = "data.json";
  a.click();
  toast("ดาวน์โหลด data.json แล้ว นำไปวางทับใน projects/" + SLUG);
}

/* ---------- lightbox ---------- */
function openLB(list, id) {
  lbList = list;
  lbIdx = list.indexOf(id);
  drawLB();
  $("#lb").classList.add("open");
}
function closeLB() { $("#lb").classList.remove("open"); }
function stepLB(d) {
  lbIdx = (lbIdx + d + lbList.length) % lbList.length;
  drawLB();
}
function drawLB() {
  const ph = DATA.photos.find(x => x.id === lbList[lbIdx]);
  if (!ph) { closeLB(); return; }
  $("#lb-name").textContent = `${ph.name} · ${lbIdx + 1}/${lbList.length}`;
  $("#lb-photo").src = fullURL(ph);
  const fc = $("#lb-faces");
  fc.innerHTML = "";
  ph.faces.forEach((f, fi) => {
    const p = DATA.people.find(x => x.id === f.personId);
    if (!p) return;
    const chip = personChip(p, "lb");
    if (ADMIN) {
      chip.append(el("span", "edit", "ย้าย"));
      chip.onclick = e => { e.stopPropagation(); openPicker(ph.id, fi, p); };
    }
    fc.append(chip);
  });
  const ac = $("#lb-actions");
  ac.innerHTML = "";
  const dl = printDL(ph);
  if (dl) {
    const a = el("a", "btn gold", "⬇ ดาวน์โหลดไฟล์ปริ้น (ความละเอียดเต็ม)");
    a.href = dl;
    ac.append(a);
  } else {
    ac.append(el("span", "btn line", "ไม่มีไฟล์ปริ้นสำหรับรูปนี้"));
  }
  const dv = driveView(ph);
  if (dv) {
    const a = el("a", "btn line", "เปิดใน Google Drive");
    a.href = dv; a.target = "_blank";
    ac.append(a);
  }
}

/* ---------- picker: เลือกคนปลายทางเวลาย้ายหน้า ---------- */
function openPicker(photoId, fi, fromPerson) {
  const ov = el("div", "picker");
  ov.onclick = e => { if (e.target === ov) ov.remove(); };
  const panel = el("div", "picker-panel");
  panel.append(
    el("h3", null, `หน้านี้ตอนนี้อยู่กับ "${fromPerson.name}"`),
    el("p", null, "เลือกคนที่ถูกต้อง หรือแยกเป็นคนใหม่"));
  const list = el("div", "picker-list");

  const nw = el("button", "pick-item new", "➕ แยกเป็นคนใหม่");
  nw.onclick = () => {
    applyOp({ t: "move", photo: photoId, fi, to: "+", nid: nextNewId() });
    ov.remove(); toast("แยกเป็นคนใหม่แล้ว"); render(); drawLB();
  };
  list.append(nw);

  DATA.people.filter(p => p.id !== fromPerson.id).forEach(p => {
    const it = el("button", "pick-item");
    const im = el("img"); im.src = resolve("faces/" + p.cover); im.loading = "lazy";
    const tx = el("div");
    tx.append(el("div", "pi-nm", p.name), el("div", "pi-ct", `${p.photoCount} รูป · ${p.faceCount} หน้า`));
    it.append(im, tx);
    it.onclick = () => {
      applyOp({ t: "move", photo: photoId, fi, to: p.id });
      ov.remove(); toast(`ย้ายไป "${p.name}" แล้ว`); render(); drawLB();
    };
    list.append(it);
  });
  panel.append(list);
  ov.append(panel);
  document.body.append(ov);
}
document.addEventListener("keydown", e => {
  if (!$("#lb").classList.contains("open")) return;
  if (e.key === "Escape") closeLB();
  if (e.key === "ArrowLeft") stepLB(-1);
  if (e.key === "ArrowRight") stepLB(1);
});

/* ---------- swipe ซ้าย/ขวาใน lightbox (มือถือ) ---------- */
(() => {
  const zone = document.querySelector(".lb-img");
  let x0 = 0, y0 = 0;
  zone.addEventListener("touchstart", e => {
    x0 = e.touches[0].clientX; y0 = e.touches[0].clientY;
  }, { passive: true });
  zone.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - x0;
    const dy = e.changedTouches[0].clientY - y0;
    if (Math.abs(dx) > 48 && Math.abs(dx) > 1.5 * Math.abs(dy)) stepLB(dx < 0 ? 1 : -1);
  }, { passive: true });
})();

boot();
</script>
